<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot – Table Tennis Guide</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6fff8; /* soft mint */
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      width: 95%;
      max-width: 850px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      color: #2f855a; /* dark green */
    }

    header p {
      color: #4a5568;
      font-size: 1rem;
    }

    /* Upload Section */
    .upload-box {
      background: #f0fff4;
      border: 2px dashed #38a169;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .upload-box input[type=file] {
      margin-top: 10px;
    }

    /* Controls */
    .controls {
      margin-bottom: 15px;
    }

    .controls label {
      font-weight: bold;
      color: #2f855a;
      margin-right: 10px;
    }

    select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #a3d9a5;
      outline: none;
    }

    /* Chat Box */
    #chat-box {
      width: 100%;
      height: 400px;
      border: 1px solid #c6f6d5;
      padding: 15px;
      overflow-y: auto;
      background: #f0fff4;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: inset 0px 2px 6px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
    }

    .user, .bot {
      padding: 10px 15px;
      border-radius: 15px;
      margin: 8px 0;
      max-width: 75%;
      word-wrap: break-word;
    }

    .user {
      background: #e6fffa;
      color: #2c5282;
      align-self: flex-end;
    }

    .bot {
      background: #edf2f7;
      color: #22543d;
      align-self: flex-start;
    }

    /* Input Area */
    .input-area {
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #a3d9a5;
      outline: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #38a169; /* green */
      color: #fff;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    button:hover {
      background: #2f855a;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏓 AI Chatbot – Table Tennis Guide</h1>
      <p>Ask questions, upload files, and explore TT knowledge</p>
    </header>

    <!-- Upload section -->
    <div class="upload-box">
      <p><b>Upload your files (.txt, .pdf, .xlsx)</b></p>
      <input type="file" id="file-upload" multiple>
    </div>

    <!-- Search mode -->
    <div class="controls">
      <label for="search-mode">Search Mode:</label>
      <select id="search-mode">
        <option value="hybrid">Hybrid (Recommended)</option>
        <option value="global">Global Search</option>
        <option value="local">Local Search</option>
      </select>
    </div>

    <!-- Chat Box -->
    <div id="chat-box"></div>

    <!-- Input Area -->
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ask something about TT...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      let input = document.getElementById("user-input");
      let chatBox = document.getElementById("chat-box");
      let searchMode = document.getElementById("search-mode").value;

      let userMsg = input.value.trim();
      if (!userMsg) return;

      chatBox.innerHTML += `<div class='user'><b>You:</b> ${userMsg}</div>`;
      input.value = "";

      try {
        let response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            query: userMsg,
            search_mode: searchMode 
          })
        });

        let data = await response.json();
        let botResponse = data.response || "No response received";
        let sourcesInfo = data.sources_found ? ` (${data.sources_found} sources found)` : "";
        
        chatBox.innerHTML += `<div class='bot'><b>Bot [${data.search_mode}]:</b> ${botResponse}${sourcesInfo}</div>`;
        
      } catch (error) {
        chatBox.innerHTML += `<div class='bot'><b>Bot:</b> Error occurred</div>`;
      }
      
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
